{% extends "base.html" %}

{% block title %}ClipConnect — Player{% endblock %}

{% block content %}
<div id="app" data-session-id="{{ session_id }}">
    <header id="header">
        <h1>ClipConnect</h1>
        <div id="warnings" class="warnings hidden"></div>
    </header>

    <div id="video-grid"></div>

    <div id="master-controls">
        <button id="btn-play" type="button">Play</button>
        <input id="seek-bar" type="range" min="0" max="100" value="0" step="0.01">
        <span id="time-display">0:00.0 / 0:00.0</span>
        <label for="audio-source">Audio:</label>
        <select id="audio-source"></select>
    </div>
</div>
<script type="module" src="/static/player.js"></script>
{% endblock %}
